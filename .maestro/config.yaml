# .maestro/config.yaml
# Maestro Configuration — Edit this file to customize behavior

# Project metadata
project:
  name: "my-project"
  description: "Project description"
  # Base branch for PR comparisons and diff analysis
  base_branch: main

# Agent routing — maps task labels to agent identifiers
# Agents are spawned via Task() with subagent_type set to these values
agent_routing:
  backend: general # Go/Python/backend implementation
  frontend: general # React/TypeScript/frontend implementation
  test: general # Test writing
  fix: general # Fix tasks from reviews
  refactor: general # Code improvement
  review: general # Code review
  pm-validation: general # PM feature validation

# Compile gate — stack-specific build+lint commands
# Maestro reads the 'stack' field and runs the corresponding command
compile_gate:
  go: "cd cmd/maestro-cli && go build ./... && go vet ./... && go test ./..."
  node: "pnpm run build && pnpm run test:run"
  python: "python -m py_compile **/*.py && ruff check ."
  rust: "cd src-tauri && cargo check && cargo test"
  elixir: "mix compile --warnings-as-errors && mix test"
  # Multi-stack support: list stacks to run in a single invocation
  # If present, overrides 'stack' (single value). Add entries as YAML list items.
  stacks:
    - go
    - bash
  bash: "find . -name '*.sh' -print0 | xargs -0 -n1 bash -n"  # syntax-check all .sh files
  # The stack to use for this project (must match a key above)
  stack: go
  repos:
    # NEW (062): per-repo stack assignment used by post-062 compile-gate.sh.
    # Lookup is dirname-based — match the worktree's repo dirname against
    # these keys (literal first, then glob). If no entry matches the
    # gate refuses to run rather than guessing.
    spec-maestro: go,ts        # this repo: Go CLI in cmd/maestro-cli + TS frontend in src/
    # Add entries for common AltPayments patterns:
    svc-example-go: go           # Go microservice example
    scripts: bash                # pure-bash repo or scripts-only context
    # Example consumer-project entries (downstream projects supply their own):
    # "svc-*": go              # AltPayments services
    # alt-front-end: typescript

# Size mapping — converts T-shirt sizes to minutes for bd estimates
size_mapping:
  XS: 120 # 2 hours
  S: 360 # 6 hours
  M: 720 # 12 hours
  L: 1200 # 20 hours

# Review sizing — review tasks get smaller estimates
review_sizing:
  XS: 120 # XS impl -> XS review
  S: 120 # S impl -> XS review
  M: 360 # M impl -> S review
  L: 360 # L impl -> S review

bd_stable_prefix: altpay-
bd_label_template: "feature:{feature_num}"

